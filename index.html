<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ตารางงานทีม 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F2F2F7;--surface:#fff;--surface2:#F8F8FC;
  --border:#E5E5EA;--border2:#D1D1D6;
  --text:#1C1C1E;--text2:#6C6C70;--text3:#AEAEB2;
  --blue:#185FA5;--green:#2E7D32;--red:#D32F2F;
  --radius:14px;--radius-sm:8px;--radius-pill:999px;
  --shadow:0 2px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 40px rgba(0,0,0,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}

/* ── Layout ── */
.page{max-width:1160px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#185FA5,#534AB7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-size:20px;font-weight:700;color:var(--text);line-height:1.1}
.header-sub{font-size:12px;color:var(--text2);margin-top:1px}
.header-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);font-size:13px;font-weight:500;color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#1450890;opacity:.9}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;font-size:16px}

/* ── Month tabs ── */
.month-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.month-scroll{display:flex;overflow-x:auto;gap:5px;flex:1;padding-bottom:2px;scrollbar-width:none}
.month-scroll::-webkit-scrollbar{display:none}
.mtab{padding:6px 15px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:all .15s;font-weight:500}
.mtab:hover{background:var(--surface2);border-color:var(--border2)}
.mtab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(24,95,165,.3)}

/* ── Team bar ── */
.team-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;align-items:center}
.team-label{font-size:12px;color:var(--text3);font-weight:500;margin-right:2px}
.person-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text2);transition:all .15s}
.person-chip:hover{background:var(--surface2)}
.person-chip.active{color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.person-chip .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip-all.active{background:#3A3A3C;color:#fff}

/* ── Stats cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-count{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-done{font-size:11px;color:var(--green);margin-top:3px;font-weight:500;min-height:16px}
.stat-name{font-size:12px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:5px;font-weight:500}
.stat-progress{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.stat-progress-bar{height:100%;border-radius:2px;transition:width .3s}

/* ── Calendar ── */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.dh{background:var(--surface2);padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
.dh.sun{color:#C0392B}.dh.sat{color:#534AB7}
.dc{background:var(--surface);padding:7px;min-height:96px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:background .1s;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.dc:nth-child(7n){border-right:none}
.dc:hover{background:#F0F4FF}
.dc.off{background:var(--surface2);cursor:default;pointer-events:none;opacity:.5}
.dc.hol{background:#FFFDF0}
.dc.today-cell{background:#EFF6FF}
.dc.today-cell .dn-num{background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.dn{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.dn.wknd .dn-num{color:#C0392B}
.dn.hday .dn-num{color:#E67E22}
.hbadge{font-size:8px;background:#FDEBD0;color:#784212;border-radius:3px;padding:1px 5px;max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.task-chip{font-size:10px;border-radius:5px;padding:2px 6px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;transition:opacity .15s}
.task-chip.done-chip{opacity:.38;text-decoration:line-through}
.more-chip{font-size:9px;color:var(--text3);padding:1px 3px;font-weight:500}

/* ── Overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);width:440px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:popIn .18s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:1.25rem 1.25rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-header h3{font-size:16px;font-weight:700;color:var(--text)}
.modal-body{padding:1rem 1.25rem}
.modal-footer{padding:.75rem 1.25rem 1.25rem;display:flex;gap:8px;justify-content:flex-end}
.x-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.x-btn:hover{background:var(--border)}

/* Form */
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.form-group select,.form-group input[type=text],.form-group input[type=date]{width:100%;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);padding:9px 12px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s}
.form-group select:focus,.form-group input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}

/* Task list in day modal */
.task-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.task-row{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:var(--radius-sm)}
.task-person-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--radius-pill);flex-shrink:0}
.task-job{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.task-job.done-text{text-decoration:line-through;opacity:.45}
.done-btn{padding:4px 10px;border-radius:var(--radius-pill);border:1px solid;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .15s}
.done-btn.undone{border-color:var(--green);background:transparent;color:var(--green)}
.done-btn.undone:hover{background:#E8F5E9}
.done-btn.is-done{border-color:var(--green);background:var(--green);color:#fff}
.del-task-btn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.del-task-btn:hover{background:#FEECEC;color:var(--red)}
.add-section{border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.add-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px}

/* Person modal */
.person-modal-inner{width:500px;max-width:100%}
.person-banner{height:6px;border-radius:var(--radius) var(--radius) 0 0;margin:-0px}
.person-hero{display:flex;align-items:center;gap:14px;padding:1.25rem 1.25rem .75rem;border-bottom:1px solid var(--border)}
.person-avatar-lg{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.person-hero-info h3{font-size:18px;font-weight:700;color:var(--text)}
.person-hero-info p{font-size:12px;color:var(--text2);margin-top:2px}
.person-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 9px;border-radius:var(--radius-pill);font-weight:600}
.badge-total{background:#EFF6FF;color:#185FA5}
.badge-done{background:#E8F5E9;color:#2E7D32}
.badge-pending{background:#FFF3E0;color:#E65100}
.person-month-tasks{padding:1rem 1.25rem}
.day-group{margin-bottom:14px}
.day-group-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.ptask-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:4px}
.ptask-text{font-size:13px;color:var(--text);flex:1}
.ptask-text.done-text{text-decoration:line-through;opacity:.45}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.empty-state-icon{font-size:36px;margin-bottom:8px}
.empty-state p{font-size:13px}

/* Team manage modal */
.people-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.people-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border)}
.people-item-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.people-item-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.people-item-count{font-size:11px;color:var(--text2)}
.del-person-btn{padding:4px 10px;border-radius:var(--radius-pill);border:1px solid #FFCDD2;background:transparent;color:var(--red);font-size:11px;font-weight:600;transition:all .15s}
.del-person-btn:hover{background:#FEECEC}
.del-person-btn:disabled{opacity:.3;cursor:not-allowed}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch.selected{border-color:var(--text);transform:scale(1.15)}
.divider{height:1px;background:var(--border);margin:12px 0}

/* Mobile dots */
.mobile-dots{display:none;flex-wrap:wrap;gap:3px;margin-top:3px}
.mdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mdot-more{font-size:9px;color:var(--text3);font-weight:600;line-height:9px}

/* Responsive */
@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .dc{min-height:70px;padding:4px}
  .task-chip{display:none}
  .more-chip{display:none}
  .mobile-dots{display:flex}
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">📅</div>
      <div>
        <div class="header-title">ตารางงานทีม</div>
        <div class="header-sub">2025</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openTeamManager()">👥 จัดการทีม</button>
      <button class="btn btn-primary" onclick="openAdd()">＋ เพิ่มงาน</button>
    </div>
  </div>

  <!-- Month tabs -->
  <div class="month-row">
    <div class="month-scroll" id="monthTabs"></div>
  </div>

  <!-- Team filter chips -->
  <div class="team-bar" id="teamBar"></div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Calendar -->
  <div class="cal-wrap">
    <div class="cal-grid" id="calGrid"></div>
  </div>

</div>

<!-- ══ Day Modal ══ -->
<div class="overlay" id="dayOverlay" onclick="bgClose(event,'dayOverlay')">
<div class="modal">
  <div class="modal-header">
    <h3 id="dlgTitle">วันที่</h3>
    <button class="x-btn" onclick="closeModal('dayOverlay')">✕</button>
  </div>
  <div class="modal-body">
    <div class="task-list" id="dlgTaskList"></div>
    <div class="add-section">
      <div class="add-section-title">➕ เพิ่มงานใหม่</div>
      <div class="form-group">
        <label>ชื่อ</label>
        <select id="dlgPerson"></select>
      </div>
      <div class="form-group">
        <label>วันที่</label>
        <input type="date" id="dlgDate"/>
      </div>
      <div class="form-group">
        <label>รายละเอียดงาน</label>
        <input type="text" id="dlgJob" placeholder="เช่น ถ่าย MuStation, ตัดต่อ ep.5"/>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('dayOverlay')">ยกเลิก</button>
    <button class="btn btn-primary" onclick="saveTask()">บันทึกงาน</button>
  </div>
</div>
</div>

<!-- ══ Person Modal ══ -->
<div class="overlay" id="personOverlay" onclick="bgClose(event,'personOverlay')">
<div class="modal person-modal-inner">
  <div id="personBanner" class="person-banner"></div>
  <div class="person-hero">
    <div class="person-avatar-lg" id="personAvatar"></div>
    <div class="person-hero-info">
      <h3 id="personNameEl"></h3>
      <p id="personMonthEl"></p>
      <div class="person-badges" id="personBadges"></div>
    </div>
    <button class="x-btn" onclick="closeModal('personOverlay')" style="margin-left:auto;align-self:flex-start">✕</button>
  </div>
  <div class="person-month-tasks" id="personTaskList"></div>
</div>
</div>

<!-- ══ Team Manager Modal ══ -->
<div class="overlay" id="teamOverlay" onclick="bgClose(event,'teamOverlay')">
<div class="modal">
  <div class="modal-header">
    <h3>👥 จัดการทีม</h3>
    <button class="x-btn" onclick="closeModal('teamOverlay')">✕</button>
  </div>
  <div class="modal-body">
    <div class="people-list" id="peopleList"></div>
    <div class="divider"></div>
    <div class="add-section-title" style="margin-bottom:10px">เพิ่มสมาชิกใหม่</div>
    <div class="form-group">
      <label>ชื่อ</label>
      <input type="text" id="newPersonName" placeholder="ชื่อสมาชิก" maxlength="20"/>
    </div>
    <div class="form-group">
      <label>เลือกสี</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('teamOverlay')">ปิด</button>
    <button class="btn btn-primary" onclick="addPerson()">เพิ่มสมาชิก</button>
  </div>
</div>
</div>

<script>
/* ══ Constants ══ */
const HOL={

};
const MTH_TH=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

const DAYS_H=["อา","จ","อ","พ","พฤ","ศ","ส"];
const PALETTE=[

/* ── Light color helpers ── */
function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return{r,g,b};
}
function lightBg(dot,a=0.12){
  const {r,g,b}=hexToRgb(dot);
  return`rgba(${r},${g},${b},${a})`;
}
function darkTx(dot){
  const {r,g,b}=hexToRgb(dot);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  if(lum>0.5){
    return `color-mix(in srgb,${dot} 80%,black)`;
  }
  return dot;
}

  {date:"2025-05-11",p:"Hardy",j:"RBK Rayong",done:false},

/* ── State ── */
let people=[];
let tasks=[];
let curMonth=new Date().getMonth();
let curFilter="all";
let selectedColor=PALETTE[0];

/* ── Storage ── */
function load(){
  try{
    const p=localStorage.getItem("sched_people_v1");
    people=p?JSON.parse(p):DEFAULT_PEOPLE.map(x=>({...x}));
    const t=localStorage.getItem("sched_tasks_v1");
    tasks=t?JSON.parse(t):PRESET.map(x=>({...x}));
    if(!t) save();
  }catch{people=DEFAULT_PEOPLE.map(x=>({...x}));tasks=PRESET.map(x=>({...x}));}
}
function save(){
  try{
    localStorage.setItem("sched_people_v1",JSON.stringify(people));
    localStorage.setItem("sched_tasks_v1",JSON.stringify(tasks));
  }catch{}
}
function getPerson(id){return people.find(p=>p.id===id)||{name:id,dot:"#999"};}

/* ── Helpers ── */
function ds(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function daysIn(m){return new Date(2025,m+1,0).getDate();}
function initials(name){return name.slice(0,1).toUpperCase();}

/* ── Build UI ── */
function buildAll(){buildTabs();buildTeamBar();buildStats();buildCal();}

function buildTabs(){
  document.getElementById("monthTabs").innerHTML=MTH_SH.map((s,i)=>
    `<button class="mtab${i===curMonth?' active':''}" onclick="goMonth(${i})">${s}</button>`
  ).join("");
}

function buildTeamBar(){
  const bar=document.getElementById("teamBar");
  const allActive=curFilter==="all";
  let html=`<span class="team-label">กรอง:</span>
    <button class="person-chip chip-all${allActive?' active':''}" onclick="setFilter('all',this)">ทั้งหมด</button>`;
  people.forEach(p=>{
    const active=curFilter===p.id;
    html+=`<button class="person-chip${active?' active':''}"
      style="${active?`background:${p.dot}`:`border-color:${p.dot}33`}"
      onclick="setFilter('${p.id}',this)">
      <span class="chip-dot" style="background:${p.dot}"></span>${p.name}
    </button>`;
  });
  bar.innerHTML=html;
}

function buildStats(){
  const dim=daysIn(curMonth);
  const counts={},dones={};
  people.forEach(p=>{counts[p.id]=0;dones[p.id]=0;});
  for(let d=1;d<=dim;d++){
    const date=ds(2025,curMonth,d);
    tasks.filter(t=>t.date===date).forEach(t=>{
      if(counts[t.p]!==undefined){counts[t.p]++;if(t.done)dones[t.p]++;}
    });
  }
  document.getElementById("statsGrid").innerHTML=people.map(p=>{
    const total=counts[p.id]||0;
    const done=dones[p.id]||0;
    const pct=total?Math.round(done/total*100):0;
    return`<div class="stat-card" onclick="openPerson('${p.id}')"
      style="border-top:3px solid ${p.dot}">
      <div class="stat-count">${total}</div>
      <div class="stat-done">${done>0?`✓ ${done} เสร็จแล้ว`:total>0?'ยังไม่เสร็จ':''}</div>
      <div class="stat-name"><span style="width:8px;height:8px;border-radius:50%;background:${p.dot};flex-shrink:0;display:inline-block"></span>${p.name}</div>
      ${total>0?`<div class="stat-progress"><div class="stat-progress-bar" style="width:${pct}%;background:${p.dot}"></div></div>`:''}
    </div>`;
  }).join("");
}

function buildCal(){
  const today=new Date();
  const todayStr=ds(today.getFullYear(),today.getMonth(),today.getDate());
  const dim=daysIn(curMonth);
  const startDow=new Date(2025,curMonth,1).getDay();
  let html=DAYS_H.map((d,i)=>`<div class="dh${i===0?' sun':i===6?' sat':''}">${d}</div>`).join("");
  for(let i=0;i<startDow;i++) html+=`<div class="dc off"></div>`;
  for(let d=1;d<=dim;d++){
    const date=ds(2025,curMonth,d);
    const dow=new Date(2025,curMonth,d).getDay();
    const isWknd=dow===0||dow===6;
    const isHol=!!HOL[date];
    const isToday=date===todayStr;
    const dayTasks=tasks.filter(t=>t.date===date);
    const visible=curFilter==="all"?dayTasks:dayTasks.filter(t=>t.p===curFilter);
    const shown=visible.slice(0,3);
    const extra=visible.length-3;
    const cls=`dc${isHol?' hol':''}${isToday?' today-cell':''}${isWknd&&!isHol?' hol':''}`;
    html+=`<div class="${cls}" onclick="openDay('${date}')">
      <div class="dn${isHol?' hday':isWknd?' wknd':''}">
        <span class="dn-num">${d}</span>
        ${isHol?`<span class="hbadge">${HOL[date]}</span>`:''}
      </div>
      ${shown.map(t=>{
        const pe=getPerson(t.p);
        return`<div class="task-chip${t.done?' done-chip':''}"
          style="background:${lightBg(pe.dot)};color:${pe.dot}">
          ${t.p==='Me'?'ฉัน':pe.name} – ${t.j}
        </div>`;
      }).join('')}
      ${extra>0?`<div class="more-chip">+${extra} งาน</div>`:''}
      <div class="mobile-dots">
        ${shown.map(t=>{const pe=getPerson(t.p);return`<div class="mdot${t.done?' done-chip':''}" style="background:${pe.dot};opacity:${t.done?.4:1}" title="${pe.name}: ${t.j}"></div>`;}).join('')}
        ${extra>0?`<span class="mdot-more">+${extra}</span>`:''}
      </div>
    </div>`;
  }
  const endDow=new Date(2025,curMonth,dim).getDay();
  for(let i=0;i<(endDow<6?6-endDow:0);i++) html+=`<div class="dc off"></div>`;
  document.getElementById("calGrid").innerHTML=html;
}

/* ── Navigation ── */
function goMonth(m){curMonth=m;buildAll();}
function setFilter(f,btn){
  curFilter=f;
  buildTeamBar();buildCal();
}

/* ── Day modal ── */
function openDay(date){
  const [,m,d]=date.split("-");
  document.getElementById("dlgTitle").textContent=`${parseInt(d)} ${MTH_TH[parseInt(m)-1]} 2568`;
  document.getElementById("dlgDate").value=date;
  document.getElementById("dlgJob").value="";
  rebuildPersonSelect("dlgPerson");
  renderDlgTasks(date);
  openModal("dayOverlay");
}
function rebuildPersonSelect(elId){
  document.getElementById(elId).innerHTML=people.map(p=>
    `<option value="${p.id}">${p.name}</option>`).join("");
}
function renderDlgTasks(date){
  const dayTasks=tasks.filter(t=>t.date===date);
  const el=document.getElementById("dlgTaskList");
  if(!dayTasks.length){
    el.innerHTML=`<p style="font-size:12px;color:var(--text3);text-align:center;padding:6px 0 2px">ยังไม่มีงานในวันนี้</p>`;
    return;
  }
  el.innerHTML=dayTasks.map(t=>{
    const pe=getPerson(t.p);
    const idx=tasks.indexOf(t);
    return`<div class="task-row" style="background:${lightBg(pe.dot,.1)}">
      <span class="task-person-badge" style="background:${pe.dot};color:#fff">${pe.name}</span>
      <span class="task-job${t.done?' done-text':''}">${t.j}</span>
      <button class="done-btn ${t.done?'is-done':'undone'}" onclick="toggleDone(${idx},'${date}')">
        ${t.done?'✓ เสร็จ':'เสร็จ?'}
      </button>
      <button class="del-task-btn" onclick="delTask(${idx},'${date}')" title="ลบงาน">🗑</button>
    </div>`;
  }).join("");
}
function toggleDone(idx,date){tasks[idx].done=!tasks[idx].done;save();renderDlgTasks(date);buildStats();buildCal();}
function delTask(idx,date){
  if(!confirm(`ลบงาน "${tasks[idx].j}" ใช่ไหม?`))return;
  tasks.splice(idx,1);save();renderDlgTasks(date);buildStats();buildCal();
}
function openAdd(){
  const t=new Date();
  openDay(ds(t.getFullYear(),t.getMonth(),t.getDate()));
}
function saveTask(){
  const p=document.getElementById("dlgPerson").value;
  const date=document.getElementById("dlgDate").value;
  const j=document.getElementById("dlgJob").value.trim();
  if(!date||!j){alert("กรุณากรอกวันที่และรายละเอียดงาน");return;}
  tasks.push({date,p,j,done:false});save();
  document.getElementById("dlgJob").value="";
  renderDlgTasks(date);buildStats();buildCal();
}

/* ── Person modal ── */
function openPerson(pid){
  const pe=getPerson(pid);
  document.getElementById("personBanner").style.background=`linear-gradient(90deg,${pe.dot},${pe.dot}88)`;
  document.getElementById("personAvatar").style.background=pe.dot;
  document.getElementById("personAvatar").textContent=initials(pe.name);
  document.getElementById("personNameEl").textContent=pe.name;
  document.getElementById("personMonthEl").textContent=`${MTH_TH[curMonth]} 2025`;

  const dim=daysIn(curMonth);
  const groups=[];
  for(let d=1;d<=dim;d++){
    const date=ds(2025,curMonth,d);
    const dt=tasks.filter(t=>t.date===date&&t.p===pid);
    if(dt.length) groups.push({date,d,tasks:dt});
  }
  const total=groups.reduce((a,g)=>a+g.tasks.length,0);
  const done=groups.reduce((a,g)=>a+g.tasks.filter(t=>t.done).length,0);
  const pending=total-done;
  document.getElementById("personBadges").innerHTML=
    `<span class="badge badge-total">${total} งานทั้งหมด</span>`+
    (done?`<span class="badge badge-done">✓ ${done} เสร็จ</span>`:'')+
    (pending?`<span class="badge badge-pending">${pending} รอดำเนินการ</span>`:'');

  const list=document.getElementById("personTaskList");
  if(!groups.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📭</div><p>ไม่มีงานในเดือนนี้</p></div>`;
  } else {
    list.innerHTML=groups.map(g=>`
      <div class="day-group">
        <div class="day-group-label">${g.d} ${MTH_TH[curMonth]}</div>
        ${g.tasks.map(t=>{
          const idx=tasks.indexOf(t);
          return`<div class="ptask-row" style="background:${lightBg(pe.dot,.1)}">
            <span class="ptask-text${t.done?' done-text':''}">${t.j}</span>
            <button class="done-btn ${t.done?'is-done':'undone'}"
              onclick="toggleDonePerson(${idx},'${pid}')">
              ${t.done?'✓ เสร็จ':'เสร็จ?'}
            </button>
          </div>`;
        }).join('')}
      </div>`).join("");
  }
  openModal("personOverlay");
}
function toggleDonePerson(idx,pid){tasks[idx].done=!tasks[idx].done;save();openPerson(pid);buildStats();buildCal();}

/* ── Team Manager ── */
function openTeamManager(){
  renderPeopleList();
  renderColorGrid();
  openModal("teamOverlay");
}
function renderPeopleList(){
  const el=document.getElementById("peopleList");
  el.innerHTML=people.map(p=>{
    const cnt=tasks.filter(t=>t.p===p.id).length;
    return`<div class="people-item">
      <span class="people-item-dot" style="background:${p.dot}"></span>
      <span class="people-item-name">${p.name}</span>
      <span class="people-item-count">${cnt} งาน</span>
      <button class="del-person-btn" onclick="removePerson('${p.id}')"
        ${cnt>0?`title="มีงานอยู่ ${cnt} งาน — ลบจะลบงานด้วย"`:''}>ลบออก</button>
    </div>`;
  }).join("");
}
function renderColorGrid(){
  let sel=selectedColor;
  document.getElementById("colorGrid").innerHTML=PALETTE.map(c=>
    `<div class="color-swatch${c===sel?' selected':''}"
      style="background:${c}"
      onclick="pickColor('${c}',this)"
      title="${c}"></div>`
  ).join("");
}
function pickColor(c,el){
  selectedColor=c;
  document.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("selected"));
  el.classList.add("selected");
}
function addPerson(){
  const nameEl=document.getElementById("newPersonName");
  const name=nameEl.value.trim();
  if(!name){nameEl.focus();return;}
  if(people.find(p=>p.name.toLowerCase()===name.toLowerCase())){
    alert("มีชื่อนี้อยู่แล้ว");return;
  }
  const id="p_"+Date.now();
  people.push({id,name,dot:selectedColor});
  save();nameEl.value="";
  renderPeopleList();buildAll();
}
function removePerson(pid){
  const pe=getPerson(pid);
  const cnt=tasks.filter(t=>t.p===pid).length;
  const msg=cnt>0
    ?`ลบ "${pe.name}" ออกจากทีม?\n\nมีงาน ${cnt} รายการที่จะถูกลบด้วย`
    :`ลบ "${pe.name}" ออกจากทีมใช่ไหม?`;
  if(!confirm(msg))return;
  tasks=tasks.filter(t=>t.p!==pid);
  people=people.filter(p=>p.id!==pid);
  if(curFilter===pid)curFilter="all";
  save();renderPeopleList();buildAll();
}

/* ── Modal helpers ── */
function openModal(id){document.getElementById(id).classList.add("show");}
function closeModal(id){document.getElementById(id).classList.remove("show");}
function bgClose(e,id){if(e.target===document.getElementById(id))closeModal(id);}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    ["dayOverlay","personOverlay","teamOverlay"].forEach(closeModal);
  }
  if(e.key==="Enter"&&document.getElementById("dayOverlay").classList.contains("show")){
    const j=document.getElementById("dlgJob");
    if(document.activeElement===j&&j.value.trim())saveTask();
  }
});

/* ── Init ── */
load();buildAll();
